<!DOCTYPE html>
<html>

<head>
    <title>TechStart Careers: Job Application</title>
    <link rel="stylesheet" href="job-application-styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo"></div>

            <nav class="step-nav">
                <button class="step-btn" data-section="section-1" onclick="showSection('section-1',this)">
                    <span class="step-icon"><i class="bi bi-person-fill" id="person"></i></span>
                    <span class="step-label">Personal Information</span>
                    <span class="step-num">01</span>
                </button>
    
                <button class="step-btn" data-section="section-2" onclick="showSection('section-2',this)">
                    <span class="step-icon"><i class="bi bi-telephone-fill"></i></span>
                    <span class="step-label">Details</span>
                    <span class="step-num">02</span>
                </button>
    
                <button class="step-btn" data-section="section-3" onclick="showSection('section-3',this)">
                    <span class="step-icon"><i class="bi bi-briefcase-fill"></i></span>
                    <span class="step-label">Position & Experience</span>
                    <span class="step-num">03</span>
                </button>
    
                <button class="step-btn" data-section="section-4" onclick="showSection('section-4',this)">
                    <span class="step-icon"><i class="bi bi-award-fill"></i></span>
                    <span class="step-label">Skills & Qualifications</span>
                    <span class="step-num">04</span>
                </button>
    
                <button class="step-btn" data-section="section-5" onclick="showSection('section-5',this)">
                    <span class="step-icon"><i class="bi bi-clock-fill"></i></span>
                    <span class="step-label">Availability & Preferences</span>
                    <span class="step-num">05</span>
                </button>
    
                <button class="step-btn" data-section="section-6" onclick="showSection('section-6',this)">
                    <span class="step-icon"><i class="bi bi-file-earmark-fill"></i></span>
                    <span class="step-label">Application Materials</span>
                    <span class="step-num">06</span>
                </button>
    
                <button class="step-btn" data-section="section-7" onclick="showSection('section-7',this)">
                    <span class="step-icon"><i class="bi bi-check-circle-fill"></i></span>
                    <span class="step-label">Submit Application</span>
                    <span class="step-num">07</span>
                </button>  
            </nav>

            <div class="sidebar-footer"></div>

        </aside>

        <main class="main-content">

            <!-- Form Header -->

            <header>
                <div class="form-header">
                    <div class="header-tag">We Are Hiring</div>
                    <h1>Join Our Team</h1>
                    <p>Fill out all required fields marked with <span class="req-star">*</span></p>
                </div>
            </header>

            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar" style="width: 14.28%;"></div>
            </div>

            <form action="" method="get">


                <!-- Section 1: Personal Information -->
                <div class="section">
                    <fieldset id="section-1">
                        <label for="personal-info-first-name"> First Name:* </label>
                        <input type="text" required name="firstName" id="personal-info-first-name" />

                        <label for="personal-info-last-name"> Last Name:* </label>
                        <input type="text" required name="lastName" id="personal-info-last-name">

                        <label for="personal-info-dob">Date Of Birth: </label>
                        <input type="date" name="DOB" id="personal-info-dob">

                        <label>Gender: </label>
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male"> Male </label>
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female"> Female </label>
                    </fieldset>
                </div>

                <!-- Section 2: Contact Details -->
                <div class="section">
                    <fieldset id="section-2">
                        <!-- Add your fields here -->
                        <label for="email">Email Address:* </label>
                        <input type="email" id="email" name="email" required>

                        <label for="phone-number">Phone number:* </label>
                        <input type="tel" name="phone-number" id="phone-number" required>

                        <label for="address"> Street Address: </label>
                        <input type="text" id="address" name="address">

                        <label for="city"> City:* </label>
                        <input type="text" id="city" name="city" required>

                        <label for="state"> State/Province: </label>
                        <select name="state" id="state">
                            <option value="">--Select a state--</option>
                            <option value="CA">California</option>
                            <option value="TX">Texas</option>
                            <option value="FL">Florida</option>
                            <option value="NY">New York</option>
                            <option value="IL">Illinois</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="OH">Ohio</option>
                            <option value="GA">Georgia</option>
                            <option value="NC">North Carolina</option>
                            <option value="MI">Michigan</option>
                        </select>

                        <label for="zip">ZIP/Postal code: </label>
                        <input type="text" id="zip" name="zip">

                        <label for="country"> Country: </label>
                        <select id="country" name="country">
                            <option value="">--Select a country--</option>
                            <option value="US">United States</option>
                            <option value="CA">Canada</option>
                            <option value="BR">Brazil</option>
                            <option value="UK">United Kingdom</option>
                            <option value="DE">Germany</option>
                            <option value="FR">France</option>
                            <option value="IN">India</option>
                            <option value="JP">Japan</option>
                            <option value="AU">Australia</option>
                            <option value="ZA">South Africa</option>
                        </select>
                    </fieldset>
                </div>

                <!-- Section 3: Position & Experience -->
                <div class="section">
                    <fieldset id="section-3">
                        <!-- Add your fields here -->
                        <label for="position">Position applying for:</label>
                        <select id="position" name="position">
                            <option value="software_developer">Software Developer</option>
                            <option value="web_developer">Web Developer</option>
                            <option value="data_analyst">Data Analyst</option>
                            <option value="ux_ui_designer">UX/UI Designer</option>
                            <option value="project_manager">Project Manager</option>
                            <option value="marketing_specialist">Marketing Specialist</option>
                            <option value="other">Other</option>
                        </select>

                        <p>Department preference:</p>

                        <label>
                            <input type="radio" name="department" value="engineering"> Engineering
                        </label>

                        <label>
                            <input type="radio" name="department" value="design"> Design
                        </label>

                        <label>
                            <input type="radio" name="department" value="marketing"> Marketing
                        </label>

                        <label>
                            <input type="radio" name="department" value="sales"> Sales
                        </label>

                        <label>
                            <input type="radio" name="department" value="operations"> Operations
                        </label>

                        <p>Experience level:</p>

                        <label>
                            <input type="radio" name="experience" value="entry"> Entry Level (0-2 years)
                        </label>

                        <label>
                            <input type="radio" name="experience" value="mid"> Mid Level (3-5 years)
                        </label>

                        <label>
                            <input type="radio" name="experience" value="senior"> Senior Level (6-10 years)
                        </label>

                        <label>
                            <input type="radio" name="experience" value="lead"> Lead/Manager (10+ years)
                        </label>

                        <label for="employment">Current employment status:</label>
                        <select id="employment" name="employment">
                            <option value="employed">Employed</option>
                            <option value="unemployed">Unemployed</option>
                            <option value="student">Student</option>
                            <option value="freelancer">Freelancer</option>
                            <option value="other">Other</option>
                        </select>
                    </fieldset>
                </div>

                <!-- Section 4: Skills & Qualifications -->
                <div class="section">
                    <fieldset id="section-4">

                        <label>Highest education level: </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="High School"> High School
                        </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="Associate Degree"> Associate
                            Degree
                        </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="Bachelor's Degree"> Bachelor's
                            Degree
                        </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="Master's Degree"> Master's Degree
                        </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="PhD"> PhD
                        </label>

                        <label>
                            <input type="radio" name="highest_education_level" value="Other"> Other
                        </label>

                        <label>Technical Skills: </label>

                        <label>
                            <input type="checkbox" name="skills" value="HTML/CSS"> HTML/CSS
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="Javascript"> Javascript
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="Python"> Python
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="Java"> Java
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="React"> React
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="Node.js"> Node.js
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="SQL"> SQL
                        </label>

                        <label>
                            <input type="checkbox" name="skills" value="Git/Github"> Git/Github
                        </label>


                        <label>
                            Years of experience in field: <input type="number" id="years-of-experience"
                                name="years-of-experience" min="0" max="50">
                        </label>


                        <label>
                            Previous salary: <input type="number" id="previous-salary" name="previous-salary"> (in
                            dollars)
                        </label>
                    </fieldset>
                </div>

                <!-- Section 5: Availability & Preferences -->
                <div class="section">
                    <fieldset id="section-5">
                        <label>Earliest start date: <input type="date" id="earliest-start-date"
                                name="earliest-start-date"></label>

                        <label>Work preference: </label>

                        <label><input type="radio" name="wp" value="Full-time"> Full-time</label>

                        <label><input type="radio" name="wp" value="part-time"> part-time</label>

                        <label><input type="radio" name="wp" value="Contract"> Contract</label>

                        <label><input type="radio" name="wp" value="Internship"> Internship</label>


                        <label>Remote work preference: </label>

                        <label><input type="radio" name="rmp" value="Fully remote"> Fully remote</label>

                        <label><input type="radio" name="rmp" value="Hybrid"> Hybrid (2-3 days in office)</label>

                        <label><input type="radio" name="rmp" value="Fully in-office"> Fully in-office</label>

                        <label><input type="radio" name="rmp" value="No preference"> No preference</label>



                        <label>Willing to reloctae? </label>

                        <label><input type="radio" name="wtr" value="yes"> yes</label>

                        <label><input type="radio" name="wtr" value="no"> no</label>

                        <label><input type="radio" name="wtr" value="maybe"> maybe</label>



                        <label>
                            Expected salary range:
                            <select id="expected-salary" name="expected-salary">
                                <option value="30k-40k"> $30,000 - $40,000</option>
                                <option value="40k-55k"> $40,000 - $55,000</option>
                                <option value="55k-70k"> $55,000 - $70,000</option>
                                <option value="70k-85k"> $70,000 - $85,000</option>
                                <option value="85k-100k"> $85,000 - $100,000</option>
                                <option value="100+k"> $100,000+</option>
                                <option value="prefer-to-discuss"> Prefer to discuss</option>
                            </select>
                        </label>
                    </fieldset>
                </div>

                <!-- Section 6: Application Materials -->
                <div class="section">
                    <fieldset id="section-6">
                        <label>Cover letter:*

                            <textarea name="cover-letter" rows="5"
                                placeholder="Tell us why you're intrested in working at TechStart and what makes you a great fit for this role..."
                                required></textarea>
                        </label>

                        <label>How did you hear about us?
                            <select name="how-did-you-hear">
                                <option value="Company website"> Company website </option>
                                <option value="Job board"> Job board(Indeed, LinkedIn, etc.) </option>
                                <option value="Social media"> Social media </option>
                                <option value="Freind/colleague referral"> Freind/colleague referral </option>
                                <option value="Recruiter"> Recruiter </option>
                                <option value="Career fair"> Career fair </option>
                                <option value="Other"> Other </option>
                            </select>
                        </label>

                        <label>Additional comments:

                            <textarea name="additional-comments" rows="3"
                                placeholder="Any additional information you'd like to share..."></textarea>
                        </label>
                    </fieldset>
                </div>

                <!-- Submission Section -->
                <fieldset id="section-7">
                    <button type="submit">Submit</button>

                    <button type="reset">Clear Form</button>

                    <label>
                        <input type="checkbox" name="Terms and Conditions" id="Terms-and-Conditions" required>
                        I agree the terms and conditions*
                    </label>
                </fieldset>


            </form>

        </main>

        <footer>
            <p>&copy; 2024 TechStart. Equal opportunity employer.</p>
        </footer>
    </div>
    <script>
        const sections = Array.from(document.getElementsByTagName('fieldset'))
        for (let s of sections) {
            s.className = 'hidden'
        }
        showSection('section-1')
        console.log(sections)
        function showSection(id) {
            const section = document.getElementById(id)
            for (let s of sections) {
                if (s.id != id) {
                    s.className = 'hidden'
                }
            }

            section.className = 'shown'

        }
    </script>
</body>

</html>
